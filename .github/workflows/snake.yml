name: generate animation

on:
  # 12 saatte bir otomatik çalışır
  schedule:
    - cron: "0 */12 * * *"
  # elle tetikleme
  workflow_dispatch:
  # main'e her push'ta çalışır
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Matrix temalı yılan: koyu zemin + neon yeşil yılan + yeşil gradyan hücreler
      - name: Generate snake (matrix theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: MertAltuntass
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#00E676&color_dots=#0d1117,#003b1c,#00713a,#00b34d,#00E676
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
